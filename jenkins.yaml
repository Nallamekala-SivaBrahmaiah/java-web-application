apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongo-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:6.0
        ports:
        - containerPort: 27017
        volumeMounts:
        - name: mongo-storage
          mountPath: /data/db
      volumes:
      - name: mongo-storage
        persistentVolumeClaim:
          claimName: mongo-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
spec:
  selector:
    app: mongodb
  ports:
  - port: 27017
    targetPort: 27017
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: siva-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: siva-backend
  template:
    metadata:
      labels:
        app: siva-backend
    spec:
      containers:
      - name: backend
        image: 538449086740.dkr.ecr.us-east-1.amazonaws.com/siva-elastic-ecr:backend
        ports:
        - containerPort: 3000
        env:
        - name: MONGODB_URI
          value: mongodb://mongodb:27017/lakeflipmart
        - name: PORT
          value: "3000"
        - name: NODE_ENV
          value: production

---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  type: ClusterIP
  selector:
    app: siva-backend
  ports:
  - port: 3000
    targetPort: 3000

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: siva-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: siva-frontend
  template:
    metadata:
      labels:
        app: siva-frontend
    spec:
      containers:
      - name: frontend
        image: 538449086740.dkr.ecr.us-east-1.amazonaws.com/siva-elastic-ecr:frontend
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  type: LoadBalancer
  selector:
    app: siva-frontend
  ports:
  - port: 80
    targetPort: 80
