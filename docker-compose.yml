version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:6.0
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: lakeflipmart
    volumes:
      - mongo-data:/data/db
    networks:
      - lakeflip-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5

  # Backend API
  backend:
    build: ./backend
    container_name: backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGODB_URI=mongodb://mongodb:27017/lakeflipmart
      - NODE_ENV=production
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - lakeflip-network

  # Frontend Web Server
  frontend:
    build: ./frontend
    container_name: frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - lakeflip-network

networks:
  lakeflip-network:
    driver: bridge

volumes:
  mongo-data:
    driver: local
